class AnalizadorContexto:
    """Analiza el contexto real de cada partido"""
    
    def __init__(self):
        # Datos REALES de equipos en situaciones críticas
        self.equipos_urgentes = {
            # Colombia - Equipos peleando descenso/clasificación
            "Envigado": 5, "Jaguares": 5, "Patriotas": 5,
            "Boyacá Chicó": 4, "Deportivo Pasto": 4,
            
