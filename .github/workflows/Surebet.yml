# ============================================
# CONFIGURACION
# ============================================
GOLES_MINIMOS = 1.5
CUOTA_MIN = 1.25
CUOTA_MAX = 1.40
MAX_PARTIDOS = 3

# Fecha de HOY (para filtrar)
HOY = datetime.now().strftime('%Y-%m-%d')
HOY_FORMATO = datetime.now().strftime('%d/%m/%Y')

print(f"""
╔══════════════════════════════════════════════════════════╗
║           ALGORITMO INVERSO - SOLO PARTIDOS DE HOY      ║
