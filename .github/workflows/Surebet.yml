# ============================================
# EXTRACTOR WEB HÍBRIDO (MÚLTIPLES FUENTES)
# ============================================

class ExtractorWebUniversal:
    """Busca partidos de HOY en múltiples fuentes web"""
    
    def __init__(self):
        self.sesion = requests.Session()
        self.sesion.headers.update({
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
            'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8',
            'Accept-Language': 'es-ES,es;q=0.9,en;q=0.8',
            'Accept-Encoding': 'gzip, deflate, br',
            'Connection': 'keep-alive',
            'Upgrade-Insecure-Requests': '1',
        })
        self.hoy = datetime.now()
        self.fecha_hoy_str = self.hoy.strftime('%Y-%m-%d')
        self.partidos_encontrados = []
        
    # ============================================
    # FUENTE 1: SOCCERWAY (MUY CONFIABLE)
    # ============================================
    def extraer_soccerway(self):
        """Soccerway - Partidos de hoy"""
        print("\n🌐 [FUENTE 1] Soccerway...")
        partidos = []
        
        try:
            url = "https://int.soccerway.com/matches/today/"
            respuesta = self.sesion.get(url, timeout=15)
            
            if respuesta.status_code == 200:
                soup = BeautifulSoup(respuesta.text, 'html.parser')
                
                # Buscar todas las tablas de partidos
                tablas = soup.find_all('table', class_=re.compile(r'matches|competition'))
                
                for tabla in tablas:
                    filas = tabla.find_all('tr')
                    
                    for fila in filas:
                        try:
                            celdas = fila.find_all('td')
                            if len(celdas) >= 4:
                                # Extraer equipos
                                equipo_a = fila.find('td', class_='team-a')
                                equipo_b = fila.find('td', class_='team-b')
                                
                                if equipo_a and equipo_b:
                                    local = equipo_a.text.strip()
                                    visitante = equipo_b.text.strip()
                                    
                                    # Extraer hora
                                    hora_elem = fila.find('td', class_='score-time')
                                    hora = hora_elem.text.strip() if hora_elem else "?"
                                    
                                    # Extraer liga/competición
                                    liga_elem = tabla.find_previous('h3')
                                    liga = liga_elem.text.strip() if liga_elem else "Competición"
                                    
                                    if len(local) > 2 and len(visitante) > 2:
                                        partido = {
                                            'local': local,
                                            'visitante': visitante,
                                            'competicion': liga,
                                            'hora': hora,
                                            'fecha': self.fecha_hoy_str,
                                            'fuente': 'Soccerway'
                                        }
                                        partidos.append(partido)
                        except:
                            continue
                            
            print(f"   ✅ Soccerway: {len(partidos)} partidos encontrados")
            
        except Exception as e:
            print(f"   ⚠️ Error Soccerway: {str(e)[:50]}")
            
        return partidos
    
    # ============================================
    # FUENTE 2: FLASHSCORE (MUY COMPLETO)
    # ============================================
    def extraer_flashscore(self):
        """FlashScore - Múltiples ligas"""
        print("\n🌐 [FUENTE 2] FlashScore...")
        partidos = []
        
        # URLs de ligas en FlashScore
        urls = [
            # Sudamérica
            "https://www.flashscore.com/football/colombia/primera-a/",
            "https://www.flashscore.com/football/argentina/liga-profesional/",
            "https://www.flashscore.com/football/brazil/serie-a/",
            "https://www.flashscore.com/football/chile/primera-division/",
            "https://www.flashscore.com/football/uruguay/primera-division/",
            "https://www.flashscore.com/football/peru/primera-division/",
            "https://www.flashscore.com/football/ecuador/serie-a/",
            # México y USA
            "https://www.flashscore.com/football/mexico/liga-mx/",
            "https://www.flashscore.com/football/usa/mls/",
            # Europa
            "https://www.flashscore.com/football/england/premier-league/",
            "https://www.flashscore.com/football/spain/laliga/",
            "https://www.flashscore.com/football/germany/bundesliga/",
            "https://www.flashscore.com/football/italy/serie-a/",
            "https://www.flashscore.com/football/france/ligue-1/",
            "https://www.flashscore.com/football/netherlands/eredivisie/",
            "https://www.flashscore.com/football/portugal/primeira-liga/",
            # Asia
            "https://www.flashscore.com/football/japan/j1-league/",
            "https://www.flashscore.com/football/south-korea/k-league-1/",
            "https://www.flashscore.com/football/china/super-league/",
            "https://www.flashscore.com/football/saudi-arabia/pro-league/",
        ]
        
        for url in urls:
            try:
                respuesta = self.sesion.get(url, timeout=10)
                
                if respuesta.status_code == 200:
                    soup = BeautifulSoup(respuesta.text, 'html.parser')
                    
                    # Buscar partidos en el HTML
                    texto = soup.get_text()
                    
                    # Patrones de búsqueda
                    patrones = [
                        r'([A-Za-zÁ-Úá-ú\s.-]{3,35})\s+(?:vs|VS|Vs|vs\.)\s+([A-Za-zÁ-Úá-ú\s.-]{3,35})',
                        r'([A-Za-zÁ-Úá-ú\s.-]{3,35})\s+-\s+([A-Za-zÁ-Úá-ú\s.-]{3,35})',
                    ]
                    
                    for patron in patrones:
                        encontrados = re.findall(patron, texto, re.IGNORECASE)
                        
                        for local_bruto, visitante_bruto in encontrados:
                            local = local_bruto.strip()
                            visitante = visitante_bruto.strip()
                            
                            if self.es_partido_valido(local, visitante):
                                # Evitar duplicados
                                if not self.existe_partido(partidos, local, visitante):
                                    partido = {
                                        'local': local,
                                        'visitante': visitante,
                                        'competicion': self.extraer_liga_url(url),
                                        'hora': self.extraer_hora_cercana(texto, local),
                                        'fecha': self.fecha_hoy_str,
                                        'fuente': 'FlashScore'
                                    }
                                    partidos.append(partido)
                
                time.sleep(0.3)
                
            except Exception as e:
                continue
                
        print(f"   ✅ FlashScore: {len(partidos)} partidos encontrados")
        return partidos
    
    # ============================================
    # FUENTE 3: LIVESCORE (ALTERNATIVO)
    # ============================================
    def extraer_livescore(self):
        """LiveScore - Partidos de hoy"""
        print("\n🌐 [FUENTE 3] LiveScore...")
        partidos = []
        
        try:
            url = "https://www.livescore.com/en/"
            respuesta = self.sesion.get(url, timeout=15)
            
            if respuesta.status_code == 200:
                soup = BeautifulSoup(respuesta.text, 'html.parser')
                
                # Buscar partidos
                matches = soup.find_all('div', class_=re.compile(r'match|fixture', re.I))
                
                for match in matches:
                    try:
                        texto = match.get_text()
                        
                        # Buscar equipos separados por "vs"
                        patron = r'([A-Za-z0-9\s.-]{2,30})\s+(?:vs|v)\s+([A-Za-z0-9\s.-]{2,30})'
                        encontrado = re.search(patron, texto, re.IGNORECASE)
                        
                        if encontrado:
                            local = encontrado.group(1).strip()
                            visitante = encontrado.group(2).strip()
                            
                            if self.es_partido_valido(local, visitante):
                                if not self.existe_partido(partidos, local, visitante):
                                    partido = {
                                        'local': local,
                                        'visitante': visitante,
                                        'competicion': 'Competición',
                                        'hora': self.extraer_hora_cercana(texto, local),
                                        'fecha': self.fecha_hoy_str,
                                        'fuente': 'LiveScore'
                                    }
                                    partidos.append(partido)
                    except:
                        continue
                        
            print(f"   ✅ LiveScore: {len(partidos)} partidos encontrados")
            
        except Exception as e:
            print(f"   ⚠️ Error LiveScore: {str(e)[:50]}")
            
        return partidos
    
    # ============================================
    # FUENTE 4: API DE EMERGENCIA (SOLO SI NO HAY DATOS)
    # ============================================
    def extraer_api_emergencia(self):
        """API de fútbol - Solo emergencia"""
        print("\n🌐 [FUENTE 4] API de Fútbol (EMERGENCIA)...")
        partidos = []
        
        # Solo usar si las otras fuentes fallaron
        try:
            # API gratuita de football-data.org o similar
            url = "https://api.football-data.org/v4/matches"
            headers = {
                'X-Auth-Token': 'TU_API_KEY_AQUI_SI_TIENES'  # Opcional
            }
            
            # Intentar sin API key primero
            respuesta = requests.get(url, timeout=10)
            
            if respuesta.status_code == 200:
                datos = respuesta.json()
                
                for match in datos.get('matches', []):
                    fecha_match = match.get('utcDate', '')[:10]
                    
                    if fecha_match == self.fecha_hoy_str:
                        local = match.get('homeTeam', {}).get('name', '')
                        visitante = match.get('awayTeam', {}).get('name', '')
                        competicion = match.get('competition', {}).get('name', '')
                        
                        if local and visitante:
                            partido = {
                                'local': local,
                                'visitante': visitante,
                                'competicion': competicion,
                                'hora': match.get('utcDate', '?')[11:16],
                                'fecha': self.fecha_hoy_str,
                                'fuente': 'API'
                            }
                            partidos.append(partido)
                            
            print(f"   ✅ API: {len(partidos)} partidos encontrados")
            
        except:
            print("   ℹ️ API no disponible (normal, requiere key)")
            
        return partidos
    
    # ============================================
    # UTILIDADES
    # ============================================
    def es_partido_valido(self, local, visitante):
        """Verifica que sea un partido real"""
        palabras_prohibidas = [
            'vs', 'live', 'hoy', 'hora', 'final', 'min', 'minuto',
            'apostar', 'cuota', 'over', 'under', 'goles', 'pronóstico',
            'notificarme', 'favorito', 'compartir', 'twitter', 'facebook',
            'en vivo', 'finalizado', 'descanso', 'suspendido',
            'mañana', 'ayer', 'semana', 'próximo', 'cookie', 'privacy',
            'advertisement', 'sponsored', 'bet', 'casino', 'slot',
        ]
        
        if not local or not visitante:
            return False
        if local.lower() == visitante.lower():
            return False
        for palabra in palabras_prohibidas:
            if palabra in local.lower() or palabra in visitante.lower():
                return False
        if len(local) < 3 or len(visitante) < 3:
            return False
        if len(local) > 30 or len(visitante) > 30:
            return False
            
        return True
    
    def existe_partido(self, lista, local, visitante):
        """Verifica si el partido ya existe en la lista"""
        for p in lista:
            if (p['local'].lower() == local.lower() and 
                p['visitante'].lower() == visitante.lower()):
                return True
        return False
    
    def extraer_liga_url(self, url):
        """Extrae nombre de liga de la URL"""
        partes = url.strip('/').split('/')
        if len(partes) >= 2:
            pais = partes[-2].replace('-', ' ').title()
            liga = partes[-1].replace('-', ' ').title()
            return f"{pais} - {liga}"
        return "Competición"
    
    def extraer_hora_cercana(self, texto, equipo):
        """Busca hora cercana al equipo en el texto"""
        try:
            pos = texto.lower().find(equipo.lower())
            if pos > 0:
                cercania = texto[max(0, pos-50):pos+50]
                hora_match = re.search(r'(\d{1,2}:\d{2})', cercania)
                if hora_match:
                    return hora_match.group(1)
        except:
            pass
        return "?"
    
    # ============================================
    # EJECUTAR EXTRACCIÓN COMPLETA
    # ============================================
    def ejecutar(self):
        """Ejecuta todas las fuentes de extracción"""
        todos = []
        
        print("\n" + "="*60)
        print("🔍 INICIANDO BÚSQUEDA EN MÚLTIPLES FUENTES")
        print("="*60)
        
        # Fuente 1: Soccerway
        try:
            partidos_sw = self.extraer_soccerway()
            todos.extend(partidos_sw)
        except Exception as e:
            print(f"⚠️ Soccerway falló: {e}")
        
        # Fuente 2: FlashScore
        try:
            partidos_fs = self.extraer_flashscore()
            for p in partidos_fs:
                if not self.existe_partido(todos, p['local'], p['visitante']):
                    todos.append(p)
        except Exception as e:
            print(f"⚠️ FlashScore falló: {e}")
        
        # Fuente 3: LiveScore
        try:
            partidos_ls = self.extraer_livescore()
            for p in partidos_ls:
                if not self.existe_partido(todos, p['local'], p['visitante']):
                    todos.append(p)
        except Exception as e:
            print(f"⚠️ LiveScore falló: {e}")
        
        # Fuente 4: API (SOLO SI NO HAY PARTIDOS)
        if len(todos) < 5:
            try:
                partidos_api = self.extraer_api_emergencia()
                for p in partidos_api:
                    if not self.existe_partido(todos, p['local'], p['visitante']):
                        todos.append(p)
            except Exception as e:
                print(f"⚠️ API falló: {e}")
        
        # Filtrar por ligas de BetPlay
        partidos_filtrados = self.filtrar_ligas_betplay(todos)
        
        print(f"\n{'='*60}")
        print(f"📊 TOTAL PARTIDOS ENCONTRADOS: {len(todos)}")
        print(f"📊 PARTIDOS EN LIGAS BETPLAY: {len(partidos_filtrados)}")
        print(f"{'='*60}")
        
        return partidos_filtrados
    
    def filtrar_ligas_betplay(self, partidos):
        """Filtra solo partidos de ligas disponibles en BetPlay"""
        # Si no encontramos la liga exacta, mostramos todos los partidos válidos
        # ya que BetPlay tiene cobertura de prácticamente todas las ligas mayores
        if not partidos:
            return []
            
        # Lista de palabras clave de ligas que SÍ están en BetPlay
        ligas_betplay_keywords = [
            'colombia', 'betplay', 'dimayor',
            'argentina', 'brasil', 'chile', 'uruguay', 'peru', 'ecuador',
            'paraguay', 'bolivia', 'venezuela',
            'mexico', 'liga mx', 'mls', 'estados unidos',
            'premier league', 'inglaterra', 'english',
            'laliga', 'españa', 'spain',
            'bundesliga', 'alemania', 'germany',
            'serie a', 'italia', 'italy',
            'ligue 1', 'francia', 'france',
            'eredivisie', 'holanda', 'netherlands',
            'portugal', 'primeira',
            'champions', 'europa league', 'libertadores', 'sudamericana',
            'mundial', 'world cup',
            'japón', 'japan', 'j1',
            'corea', 'korea', 'k league',
            'china', 'super league',
            'arabia', 'saudi',
            'australia', 'a-league',
        ]
        
        filtrados = []
        for partido in partidos:
            competicion_lower = partido.get('competicion', '').lower()
            
            # Verificar si la competición coincide con alguna liga de BetPlay
            for keyword in ligas_betplay_keywords:
                if keyword in competicion_lower:
                    filtrados.append(partido)
                    break
            else:
                # Si no coincide con ninguna keyword pero es un partido válido,
                # lo incluimos igual (BetPlay cubre muchas ligas)
                if partido.get('local') and partido.get('visitante'):
                    filtrados.append(partido)
        
        return filtrados


