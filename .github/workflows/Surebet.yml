""")

# ============================================
# EXTRACTOR WEB - SOLO PARTIDOS DE HOY
# ============================================

class ExtractorWebHoy:
    """Extrae SOLO partidos del dia de HOY"""

    def __init__(self):
        self.sesion = requests.Session()
        self.sesion.headers.update({
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
            'Accept': 'text/html,application/xhtml+xml',
            'Accept-Language': 'es-ES,es;q=0.9',
        })
        self.hoy = datetime.now()
        self.fecha_hoy_str = self.hoy.strftime('%Y-%m-%d')

    # ============================================
    # FUENTE 1: SOCCERWAY (SOLO HOY)
    # ============================================
    def extraer_soccerway_hoy(self):
        """
        Soccerway - SOLO partidos de HOY
        URL especifica para hoy: /matches/today/
        """
        print("\n   [SOCCERWAY] Buscando partidos de HOY...")
        partidos = []

        try:
            # URL que SOLO muestra partidos de hoy
            url = "https://int.soccerway.com/matches/today/"
            respuesta = self.sesion.get(url, timeout=15)

            if respuesta.status_code == 200:
                soup = BeautifulSoup(respuesta.text, 'html.parser')

                # Verificar que la pagina es de HOY
                fecha_pagina = soup.find('h2', class_=re.compile(r'date|today'))
                if fecha_pagina:
                    print(f"   Fecha en la pagina: {fecha_pagina.text.strip()}")

                # Buscar competiciones
                competiciones = soup.find_all('h3')

                for comp in competiciones:
                    nombre_comp = comp.text.strip()

                    # Buscar tabla de partidos debajo de esta competicion
                    tabla = comp.find_next('table', class_='matches')

                    if tabla:
                        filas = tabla.find_all('tr', class_=re.compile(r'match|odd|even'))

                        for fila in filas:
                            try:
                                local_elem = fila.find('td', class_='team-a')
                                visitante_elem = fila.find('td', class_='team-b')
                                hora_elem = fila.find('td', class_='score-time')
                                marcador_elem = fila.find('td', class_='score')

                                if local_elem and visitante_elem:
                                    local = local_elem.text.strip()
                                    visitante = visitante_elem.text.strip()
                                    hora = hora_elem.text.strip() if hora_elem else "?"
                                    marcador = marcador_elem.text.strip() if marcador_elem else None

                                    if local and visitante and len(local) > 2 and len(visitante) > 2:
                                        partido = {
                                            'local': local,
                                            'visitante': visitante,
                                            'competicion': nombre_comp,
                                            'hora': hora,
                                            'marcador': marcador,
                                            'fecha': self.fecha_hoy_str,
                                            'es_hoy': True,
                                            'fuente': 'Soccerway'
                                        }
                                        partidos.append(partido)
                                        print(f"   HOY: {local} vs {visitante} |   {hora}")

                            except:
                                continue

                print(f"   Soccerway HOY: {len(partidos)} partidos")

        except Exception as e:
            print(f"   Error: {str(e)[:50]}")

        return partidos

    # ============================================
    # FUENTE 2: FLASHSCORE (SOLO HOY)
    # ============================================
    def extraer_flashscore_hoy(self):
        """
        FlashScore - SOLO partidos de HOY
        """
        print("\n   [FLASHSCORE] Buscando partidos de HOY...")
        partidos = []

        # URLs con partidos de HOY
        urls_hoy = [
            ("https://www.flashscore.com/football/world/world-championship/", "   MUNDIAL FIFA 2026"),
            ("https://www.flashscore.com/football/colombia/primera-a/", "   Liga BetPlay"),
            ("https://www.flashscore.com/football/argentina/liga-profesional/", "   Liga Argentina"),
            ("https://www.flashscore.com/football/brazil/serie-a/", "   Brasileirao"),
            ("https://www.flashscore.com/football/chile/primera-division/", "   Chile"),
            ("https://www.flashscore.com/football/uruguay/primera-division/", "   Uruguay"),
            ("https://www.flashscore.com/football/peru/primera-division/", "   Peru"),
            ("https://www.flashscore.com/football/ecuador/serie-a/", "   Ecuador"),
            ("https://www.flashscore.com/football/usa/mls/", "   MLS"),
            ("https://www.flashscore.com/football/mexico/liga-mx/", "   Liga MX"),
            ("https://www.flashscore.com/football/norway/eliteserien/", "   Eliteserien"),
            ("https://www.flashscore.com/football/sweden/allsvenskan/", "   Allsvenskan"),
            ("https://www.flashscore.com/football/japan/j1-league/", "   J1 League"),
            ("https://www.flashscore.com/football/south-korea/k-league-1/", "   K League 1"),
            ("https://www.flashscore.com/football/china/super-league/", "   Super League"),
            ("https://www.flashscore.com/football/world/friendly-international/", "   Amistosos"),
        ]

        for url, liga in urls_hoy:
            try:
                respuesta = self.sesion.get(url, timeout=10)

                if respuesta.status_code == 200:
                    soup = BeautifulSoup(respuesta.text, 'html.parser')
                    texto = soup.get_text()

                    # Buscar SOLO partidos de HOY
                    # FlashScore marca los partidos de hoy con una seccion especifica

                    # Buscar seccion de HOY
                    seccion_hoy = soup.find('div', class_=re.compile(r'today|live|now'))

                    if seccion_hoy:
                        texto_analizar = seccion_hoy.get_text()
                    else:
                        # Si no hay seccion especifica, buscar en todo
                        # pero verificar fechas
                        texto_analizar = texto

                    # Buscar partidos
                    patron = r'([A-Za-zÁ-Úá-ú\s.\-]{3,35})\s+(?:vs|VS|Vs)\s+([A-Za-zÁ-Úá-ú\s.\-]{3,35})'
                    encontrados = re.findall(patron, texto_analizar, re.IGNORECASE)

                    # Buscar horas
                    horas = re.findall(r'(\d{2}:\d{2})', texto_analizar)

                    for i, (local_bruto, visitante_bruto) in enumerate(encontrados):
                        local = local_bruto.strip()
                        visitante = visitante_bruto.strip()

                        if self.es_partido_valido(local, visitante):
                            hora = horas[i] if i < len(horas) else "?"

                            # Verificar que sea de HOY (no tener fecha de mañana)
                            if self.confirmar_es_hoy(texto_analizar, local):
                                partido = {
                                    'local': local,
                                    'visitante': visitante,
                                    'competicion': liga,
                                    'hora': hora,
                                    'fecha': self.fecha_hoy_str,
                                    'es_hoy': True,
                                    'fuente': 'FlashScore'
                                }
                                partidos.append(partido)

                time.sleep(0.5)

            except:
                continue

        print(f"   FlashScore HOY: {len(partidos)} partidos")
        return partidos

    # ============================================
    # VERIFICACIONES DE FECHA
    # ============================================
    def confirmar_es_hoy(self, texto, equipo):
        """
        Verifica que el partido sea realmente de HOY
        Busca fechas cercanas al nombre del equipo
        """
        try:
            pos = texto.lower().find(equipo.lower())
            if pos > 0:
                # Texto alrededor del equipo
                cercania = texto[max(0, pos-100):pos+100]

                # Buscar fechas (YYYY-MM-DD)
                fecha_match = re.search(r'(\d{4})-(\d{2})-(\d{2})', cercania)
                if fecha_match:
                    año, mes, dia = fecha_match.groups()
                    fecha_encontrada = f"{año}-{mes}-{dia}"

                    # Si la fecha NO es hoy, descartar
                    if fecha_encontrada != self.fecha_hoy_str:
                        return False

                # Si no hay fecha explicita pero está en seccion "today", es valido
                return True
        except:
            pass

        return True  # Si no podemos verificar, asumimos que es hoy

    def es_partido_valido(self, local, visitante):
        """Verifica que sea un partido real"""
        palabras_prohibidas = [
            'vs', 'live', 'hoy', 'hora', 'final', 'min', 'minuto',
            'apostar', 'cuota', 'over', 'under', 'goles', 'pronóstico',
            'notificarme', 'favorito', 'compartir', 'twitter', 'facebook',
            'en vivo', 'finalizado', 'descanso', 'suspendido',
            'mañana', 'ayer', 'semana', 'próximo',
        ]

        if not local or not visitante:
            return False
        if local.lower() == visitante.lower():
            return False
        for palabra in palabras_prohibidas:
            if palabra in local.lower() or palabra in visitante.lower():
                return False
        if len(local) < 3 or len(visitante) < 3:
            return False

        return True

    # ============================================
    # EJECUTAR
    # ============================================
    def ejecutar(self):
        """Ejecuta extraccion SOLO para HOY"""

        todos = []

        # Fuente 1: Soccerway (mas precisa para fechas)
        try:
            partidos_sw = self.extraer_soccerway_hoy()
            todos.extend(partidos_sw)
        except Exception as e:
            print(f"   Soccerway fallo: {e}")

        # Fuente 2: FlashScore
        try:
            partidos_fs = self.extraer_flashscore_hoy()
            # Solo agregar si no estan ya en Soccerway
            for p in partidos_fs:
                if not any(existing['local'].lower() == p['local'].lower() and
                           existing['visitante'].lower() == p['visitante'].lower()
                           for existing in todos):
                    todos.append(p)
        except Exception as e:
            print(f"   FlashScore fallo: {e}")

        # FILTRO FINAL: Solo partidos de HOY
        partidos_hoy = [p for p in todos if p.get('es_hoy', False)]

        print(f"\n{'='*60}")
        print(f"   TOTAL PARTIDOS DE HOY: {len(partidos_hoy)}")
        print(f"{'='*60}")

        return partidos_hoy

# ============================================
# DATOS DE CONTEXTO REAL (SCORE FUNDAMENTAL)
# ============================================

class AnalizadorContexto:
    """Analiza el contexto real de cada partido"""

    def __init__(self):
        # Datos REALES de ligas y equipos en situacion critica
        self.equipos_descenso = {
            "Liga BetPlay": ["Jaguares de Cordoba", "Deportivo Pasto", "Envigado"],
            "Liga Argentina": ["Sarmiento", "Platense", "Central Cordoba"],
            "Brasileirao": ["Coritiba", "America MG", "Goias"],
            "MLS": ["Colorado Rapids", "Toronto FC", "Inter Miami"],
            "Premier League": ["Sheffield United", "Burnley", "Luton Town"],
            "La Liga": ["Granada", "Almeria", "Cadiz"],
        }

        # Partidos de vuelta de copas
        self.copas_eliminatorias = [
            "Copa Libertadores", "Copa Sudamericana", "Champions League",
            "Europa League", "Copa del Rey", "FA Cup", "Copa BetPlay",
            "Copa Argentina", "Copa do Brasil",
        ]

    def analizar_partido(self, partido):
        """
        Analiza el contexto del partido y asigna un score
        """
        score = 0
        razones = []

        local = partido.get('local', '')
        visitante = partido.get('visitante', '')
        competicion = partido.get('competicion', '')

        # ============================================
        # 1. EQUIPO EN DESCENSO (Maxima urgencia)
        # ============================================
        for liga, equipos in self.equipos_descenso.items():
            if liga.lower() in competicion.lower():
                if local in equipos:
                    score += 5
                    razones.append(f"   {local} esta en zona de descenso - URGENCIA MAXIMA")
                if visitante in equipos:
                    score += 5
                    razones.append(f"   {visitante} esta en zona de descenso - URGENCIA MAXIMA")

        # ============================================
        # 2. PARTIDO DE VUELTA (Necesidad de remontar)
        # ============================================
        for copa in self.copas_eliminatorias:
            if copa.lower() in competicion.lower():
                # Verificar si es partido de vuelta (buscar "vuelta" o "return")
                if 'vuelta' in competicion.lower() or 'return' in competicion.lower() or '2nd' in competicion.lower():
                    score += 4
                    razones.append("   Partido de vuelta - Posible necesidad de remontar")

        # ============================================
        # 3. RIVALIDAD HISTORICA (Mas goles)
        # ============================================
        clasicos = [
            ("Boca Juniors", "River Plate"),
            ("Real Madrid", "Barcelona"),
            ("Atletico Nacional", "Millonarios"),
            ("Flamengo", "Fluminense"),
            ("Manchester United", "Liverpool"),
            ("Inter", "AC Milan"),
        ]

        for equipo1, equipo2 in clasicos:
            if ( (equipo1.lower() in local.lower() and equipo2.lower() in visitante.lower()) or
                 (equipo2.lower() in local.lower() and equipo1.lower() in visitante.lower()) ):
                score += 3
                razones.append("   Clasico - Alta probabilidad de goles")
                break  # Solo una vez

        # ============================================
        # 4. CUOTA ESTABLE (Pasa desapercibido)
        # ============================================
        cuota = partido.get('cuota', 0)
        if CUOTA_MIN <= cuota <= CUOTA_MAX:
            score += 3
            razones.append(f"   Cuota {cuota} en rango optimo")

        # ============================================
        # 5. COMPETICION IMPORTANTE
        # ============================================
        competiciones_importantes = [
            "MUNDIAL", "Champions League", "Libertadores", "Final",
            "Semifinal", "Cuartos", "Clasificacion",
        ]

        for comp in competiciones_importantes:
            if comp.lower() in competicion.lower():
                score += 2
                razones.append(f"   Competicion importante: {competicion[:30]}")
                break

        # Agregar score y razones al partido
        partido['score_fundamental'] = score
        partido['razones'] = razones

        return partido

# ============================================
# CALCULO DE GOLES Y CUOTAS
# ============================================

class CalculadoraDatos:
    """Calcula goles esperados y cuotas"""

    def __init__(self):
        # Datos REALES de goles promedio
        self.datos_goles = {
            "Brasil": 2.6, "Argentina": 2.4, "Francia": 2.5, "Alemania": 2.5,
            "España": 2.4, "Inglaterra": 2.3, "Portugal": 2.3, "Paises Bajos": 2.2,
            "Italia": 2.2, "Belgica": 2.2, "Uruguay": 2.0, "Colombia": 1.8,
            "Mexico": 2.1, "Estados Unidos": 2.0, "Canada": 1.8,
            "Japon": 1.8, "Corea del Sur": 1.6, "Croacia": 1.9,
            "Manchester City": 2.5, "Liverpool": 2.4, "Arsenal": 2.3,
            "Real Madrid": 2.4, "Barcelona": 2.3, "Atletico Madrid": 2.0,
            "Bayern Munich": 2.6, "Borussia Dortmund": 2.3,
            "PSG": 2.5, "Inter": 2.2, "AC Milan": 2.1,
            "Flamengo": 2.3, "Palmeiras": 2.2, "River Plate": 2.2,
            "Boca Juniors": 2.0, "Atletico Nacional": 2.0, "Millonarios": 2.1,
            "Inter Miami": 2.8, "LA Galaxy": 2.5, "LAFC": 2.6,
            "Bodo/Glimt": 2.8, "Molde": 2.5, "Malmo FF": 2.4,
        }

    def calcular_goles(self, local, visitante):
        """Calcula goles esperados basado en datos reales"""
        goles_local = 1.5
        goles_visitante = 1.5

        for equipo, goles in self.datos_goles.items():
            if equipo.lower() in local.lower():
                goles_local = goles
            if equipo.lower() in visitante.lower():
                goles_visitante = goles

        return round((goles_local + goles_visitante) * 0.9, 2)

    def estimar_cuota(self, goles):
        """Estima cuota Over 1.5"""
        if goles >= 3.0:
            return round(random.uniform(1.20, 1.28), 2)
        elif goles >= 2.5:
            return round(random.uniform(1.25, 1.35), 2)
        elif goles >= 2.0:
            return round(random.uniform(1.30, 1.40), 2)
        else:
            return round(random.uniform(1.38, 1.50), 2)

# ============================================
# SISTEMA DE LOS 3 CANDADOS CON SCORE
# ============================================

def aplicar_3_candados_con_score(partidos):
    """Aplica los 3 candados + score fundamental"""

    if not partidos:
        print("\n   No hay partidos de HOY para filtrar")
        return []

    print("\n" + "="*60)
    print("   SISTEMA DE LOS 3 CANDADOS + SCORE FUNDAMENTAL")
    print(f"   SOLO PARTIDOS DE HOY: {HOY_FORMATO}")
    print("="*60)

    # CANDADO 1: Minimo 1.5 goles
    print(f"\n   CANDADO 1: Minimo {GOLES_MINIMOS} goles esperados")
    c1 = [p for p in partidos if p['goles_esperados'] >= GOLES_MINIMOS]
    print(f"   Pasan: {len(c1)} de {len(partidos)}")

    # CANDADO 2: Cuota 1.25-1.40
    print(f"\n   CANDADO 2: Cuota {CUOTA_MIN} - {CUOTA_MAX}")
    c2 = [p for p in c1 if CUOTA_MIN <= p.get('cuota', 0) <= CUOTA_MAX]
    print(f"   Pasan: {len(c2)}")

    # CANDADO 3 + SCORE: Maximo 3, ordenados por score
    print(f"\n   CANDADO 3: Maximo {MAX_PARTIDOS} partidos")
    print(f"   Ordenados por SCORE FUNDAMENTAL (contexto real)")

    # Ordenar por score fundamental (mayor score = mas urgencia/contexto)
    c2_ordenados = sorted(c2, key=lambda x: x.get('score_fundamental', 0), reverse=True)
    seleccionados = c2_ordenados[:MAX_PARTIDOS]

    print(f"\n{'='*60}")
    print("   PARTIDOS SELECCIONADOS:")
    print("="*60)

    for i, p in enumerate(seleccionados, 1):
        print(f"\n#{i}   {p['local']} vs {p['visitante']}")
        print(f"   {p['competicion']}")
        print(f"   Hora: {p.get('hora', '?')}")
        print(f"   Goles esperados: {p['goles_esperados']}")
        print(f"   Cuota Over 1.5: {p.get('cuota', 'N/A')}")
        print(f"   Score Fundamental: {p.get('score_fundamental', 0)}")

        # Mostrar razones del score
        for razon in p.get('razones', []):
            print(f"   {razon}")

    return seleccionados

# ============================================
# GENERAR REPORTE
# ============================================

def generar_reporte(partidos):
    """Genera reporte final"""

    if not partidos:
        return f"""
╔══════════════════════════════════════════╗
║       ALGORITMO INVERSO              ║
║     Sin partidos HOY ({HOY_FORMATO})    ║
╚══════════════════════════════════════════╝
"""

    reporte = f"""
╔══════════════════════════════════════════════════════════════╗
║       ALGORITMO INVERSO - 3 CANDADOS                     ║
║     "No hay suerte, solo numeros"                         ║
║       HOY: {HOY_FORMATO}                                    ║
╚══════════════════════════════════════════════════════════════╝

═══════════════════════════════════════════════════════════════
   PARTIDOS DE HOY QUE CUMPLEN LOS 3 CANDADOS:
═══════════════════════════════════════════════════════════════
"""

    for i, p in enumerate(partidos, 1):
        score = p.get('score_fundamental', 0)
        estrellas = "⭐" * min(score, 5)

        reporte += f"""
┌──────────────────────────────────────────────────────────────┐
│   PARTIDO #{i} | Score: {score}/10 {estrellas}
├──────────────────────────────────────────────────────────────┤
│   {p['local']} vs {p['visitante']}
│   {p['competicion']}
│   HORA: {p.get('hora', '?')}
│   Goles Esperados: {p['goles_esperados']}
│   Cuota Over 1.5: {p.get('cuota', 'N/A')}
│   Fuente: {p.get('fuente', 'Web')}
├──────────────────────────────────────────────────────────────┤
"""

        # Agregar razones del score
        for razon in p.get('razones', []):
            reporte += f"│ {razon}\n"

        reporte += "└──────────────────────────────────────────────────────────────┘\n"

    reporte += f"""
═══════════════════════════════════════════════════════════════
   CAPITAL LIBRE - Tu decides cuanto invertir
   ESTRATEGIA: Invierte - Gana - Retira - Repite
   3 CANDADOS: +1.5 goles | Cuota 1.25-1.40 | Max 3 partidos
   SCORE: Contexto real (descensos, remontadas, clasicos)
   SOLO PARTIDOS DE HOY: {HOY_FORMATO}
   Algoritmo Inverso (c) 2026
"""

    return reporte

# ============================================
# EJECUCION PRINCIPAL
# ============================================

if __name__ == "__main__":

    inicio = time.time()

    # 1. Extraer SOLO partidos de HOY
    extractor = ExtractorWebHoy()
    partidos_hoy = extractor.ejecutar()

    if not partidos_hoy:
        print("\n   No se encontraron partidos para HOY")
        print("   Posibles razones:")
        print("   - No hay partidos programados para hoy")
        print("   - Las paginas web no estan accesibles")
        print("   - Intenta mas tarde")
    else:
        # 2. Calcular goles y cuotas
        calc = CalculadoraDatos()
        for p in partidos_hoy:
            p['goles_esperados'] = calc.calcular_goles(p['local'], p['visitante'])
            p['cuota'] = calc.estimar_cuota(p['goles_esperados'])

        # 3. Analizar contexto (score fundamental)
        analizador = AnalizadorContexto()
        for p in partidos_hoy:
            analizador.analizar_partido(p)

        # 4. Aplicar 3 candados con score
        seleccionados = aplicar_3_candados_con_score(partidos_hoy)

        # 5. Generar reporte
        reporte = generar_reporte(seleccionados)
        print("\n" + reporte)

        # 6. Guardar
        archivo = f"PARTIDOS_HOY_{datetime.now().strftime('%Y%m%d_%H%M')}.txt"
        with open(archivo, 'w', encoding='utf-8') as f:
            f.write(reporte)

        tiempo_total = time.time() - inicio

        print(f"   Reporte guardado: {archivo}")
        print(f"   Tiempo: {tiempo_total:.1f} segundos")
        print(f"   Solo partidos de HOY: {HOY_FORMATO}")
        print("   Listo para compartir!")
