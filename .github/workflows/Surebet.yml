                            }
                            partidos.append(partido)
                            
            print(f"   ✅ API: {len(partidos)} partidos encontrados")
            
        except:
            print("   ℹ️ API no disponible (normal, requiere key)")
            
        return partidos
    
    # ============================================
    # UTILIDADES
    # ============================================
    def es_partido_valido(self, local, visitante):
        """Verifica que sea un partido real"""
        palabras_prohibidas = [
            'vs', 'live', 'hoy', 'hora', 'final', 'min', 'minuto',
            'apostar', 'cuota', 'over', 'under', 'goles', 'pronóstico',
            'notificarme', 'favorito', 'compartir', 'twitter', 'facebook',
            'en vivo', 'finalizado', 'descanso', 'suspendido',
            'mañana', 'ayer', 'semana', 'próximo', 'cookie', 'privacy',
            'advertisement', 'sponsored', 'bet', 'casino', 'slot',
        ]
        
        if not local or not visitante:
            return False
        if local.lower() == visitante.lower():
            return False
        for palabra in palabras_prohibidas:
            if palabra in local.lower() or palabra in visitante.lower():
                return False
        if len(local) < 3 or len(visitante) < 3:
            return False
        if len(local) > 30 or len(visitante) > 30:
            return False
            
        return True
    
    def existe_partido(self, lista, local, visitante):
        """Verifica si el partido ya existe en la lista"""
        for p in lista:
            if (p['local'].lower() == local.lower() and 
                p['visitante'].lower() == visitante.lower()):
                return True
        return False
    
    def extraer_liga_url(self, url):
        """Extrae nombre de liga de la URL"""
        partes = url.strip('/').split('/')
        if len(partes) >= 2:
            pais = partes[-2].replace('-', ' ').title()
            liga = partes[-1].replace('-', ' ').title()
            return f"{pais} - {liga}"
        return "Competición"
    
    def extraer_hora_cercana(self, texto, equipo):
        """Busca hora cercana al equipo en el texto"""
        try:
            pos = texto.lower().find(equipo.lower())
            if pos > 0:
                cercania = texto[max(0, pos-50):pos+50]
                hora_match = re.search(r'(\d{1,2}:\d{2})', cercania)
                if hora_match:
                    return hora_match.group(1)
        except:
            pass
        return "?"
    
    # ============================================
    # EJECUTAR EXTRACCIÓN COMPLETA
    # ============================================
    def ejecutar(self):
        """Ejecuta todas las fuentes de extracción"""
        todos = []
        
        print("\n" + "="*60)
        print("🔍 INICIANDO BÚSQUEDA EN MÚLTIPLES FUENTES")
        print("="*60)
        
        # Fuente 1: Soccerway
        try:
            partidos_sw = self.extraer_soccerway()
            todos.extend(partidos_sw)
        except Exception as e:
            print(f"⚠️ Soccerway falló: {e}")
        
        # Fuente 2: FlashScore
        try:
            partidos_fs = self.extraer_flashscore()
            for p in partidos_fs:
                if not self.existe_partido(todos, p['local'], p['visitante']):
                    todos.append(p)
        except Exception as e:
            print(f"⚠️ FlashScore falló: {e}")
        
        # Fuente 3: LiveScore
        try:
            partidos_ls = self.extraer_livescore()
            for p in partidos_ls:
                if not self.existe_partido(todos, p['local'], p['visitante']):
                    todos.append(p)
        except Exception as e:
            print(f"⚠️ LiveScore falló: {e}")
        
        # Fuente 4: API (SOLO SI NO HAY PARTIDOS)
        if len(todos) < 5:
            try:
                partidos_api = self.extraer_api_emergencia()
                for p in partidos_api:
                    if not self.existe_partido(todos, p['local'], p['visitante']):
                        todos.append(p)
            except Exception as e:
                print(f"⚠️ API falló: {e}")
        
        # Filtrar por ligas de BetPlay
        partidos_filtrados = self.filtrar_ligas_betplay(todos)
        
        print(f"\n{'='*60}")
        print(f"📊 TOTAL PARTIDOS ENCONTRADOS: {len(todos)}")
        print(f"📊 PARTIDOS EN LIGAS BETPLAY: {len(partidos_filtrados)}")
        print(f"{'='*60}")
        
        return partidos_filtrados
    
    def filtrar_ligas_betplay(self, partidos):
        """Filtra solo partidos de ligas disponibles en BetPlay"""
        # Si no encontramos la liga exacta, mostramos todos los partidos válidos
        # ya que BetPlay tiene cobertura de prácticamente todas las ligas mayores
        if not partidos:
            return []
            
        # Lista de palabras clave de ligas que SÍ están en BetPlay
        ligas_betplay_keywords = [
            'colombia', 'betplay', 'dimayor',
            'argentina', 'brasil', 'chile', 'uruguay', 'peru', 'ecuador',
            'paraguay', 'bolivia', 'venezuela',
            'mexico', 'liga mx', 'mls', 'estados unidos',
            'premier league', 'inglaterra', 'english',
            'laliga', 'españa', 'spain',
            'bundesliga', 'alemania', 'germany',
            'serie a', 'italia', 'italy',
            'ligue 1', 'francia', 'france',
            'eredivisie', 'holanda', 'netherlands',
            'portugal', 'primeira',
            'champions', 'europa league', 'libertadores', 'sudamericana',
            'mundial', 'world cup',
            'japón', 'japan', 'j1',
            'corea', 'korea', 'k league',
            'china', 'super league',
            'arabia', 'saudi',
            'australia', 'a-league',
        ]
        
        filtrados = []
        for partido in partidos:
            competicion_lower = partido.get('competicion', '').lower()
            
            # Verificar si la competición coincide con alguna liga de BetPlay
            for keyword in ligas_betplay_keywords:
                if keyword in competicion_lower:
                    filtrados.append(partido)
                    break
            else:
                # Si no coincide con ninguna keyword pero es un partido válido,
                # lo incluimos igual (BetPlay cubre muchas ligas)
                if partido.get('local') and partido.get('visitante'):
                    filtrados.append(partido)
        
        return filtrados


