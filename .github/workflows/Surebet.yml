# SISTEMA DE LOS 3 CANDADOS
# ============================================

def aplicar_3_candados(partidos):
    """Aplica los 3 candados + score fundamental"""
    
    if not partidos:
        print("\n❌ No hay partidos de HOY para filtrar")
        print("   💡 Consejo: Verifica que sea un día con partidos programados")
        print("   📅 Los fines de semana suele haber más partidos")
        return []
    
    print("\n" + "="*60)
    print("🔐 APLICANDO SISTEMA DE LOS 3 CANDADOS")
    print("="*60)
    
    # CANDADO 1: Mínimo 1.5 goles
    print(f"\n🔒 CANDADO 1: Mínimo {GOLES_MINIMOS} goles esperados")
    c1 = [p for p in partidos if p.get('goles_esperados', 0) >= GOLES_MINIMOS]
    print(f"   📊 Pasan: {len(c1)} de {len(partidos)}")
    
    # CANDADO 2: Cuota 1.25-1.40
    print(f"\n🔒 CANDADO 2: Cuota {CUOTA_MIN} - {CUOTA_MAX}")
    c2 = [p for p in c1 if CUOTA_MIN <= p.get('cuota', 0) <= CUOTA_MAX]
    print(f"   📊 Pasan: {len(c2)}")
    
    # CANDADO 3 + SCORE: Máximo 3, ordenados por score
    print(f"\n🔒 CANDADO 3: Máximo {MAX_PARTIDOS} partidos")
    print(f"   📊 Ordenados por SCORE FUNDAMENTAL")
    
    # Ordenar por score
    c2_ordenados = sorted(c2, key=lambda x: x.get('score_fundamental', 0), reverse=True)
    seleccionados = c2_ordenados[:MAX_PARTIDOS]
    
    # Mostrar seleccionados
    if seleccionados:
        print(f"\n{'='*60}")
        print("🏆 PARTIDOS SELECCIONADOS HOY:")
        print("="*60)
        
        for i, p in enumerate(seleccionados, 1):
            score = p.get('score_fundamental', 0)
            estrellas = "⭐" * min(score, 5)
            
            print(f"\n#{i} ⚽ {p['local']} vs {p['visitante']}")
            print(f"   📋 {p['competicion']}")
            print(f"   🕐 Hora: {p.get('hora', '?')}")
            print(f"   📊 Goles esperados: {p.get('goles_esperados', 'N/A')}")
            print(f"   💰 Cuota Over 1.5: {p.get('cuota', 'N/A')}")
            print(f"   ⭐ Score: {score}/10 {estrellas}")
            print(f"   📡 Fuente: {p.get('fuente', 'Web')}")
            
            for razon in p.get('razones', []):
                print(f"      {razon}")
    else:
        print("\n❌ Ningún partido pasó los 3 candados")
        print("   📊 Los partidos de hoy no cumplen los criterios")
        print("   💡 Recomendación: Esperar a mañana o ajustar parámetros")
    
    return seleccionados


