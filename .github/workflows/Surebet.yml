    # ============================================
    def extraer_api_emergencia(self):
        """API de fútbol - Solo emergencia"""
        print("\n🌐 [FUENTE 4] API de Fútbol (EMERGENCIA)...")
        partidos = []
        
        # Solo usar si las otras fuentes fallaron
        try:
