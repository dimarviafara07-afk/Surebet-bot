            # Brasil
            "Coritiba": 5, "América MG": 5, "Goiás": 5,
            "Santos": 4, "Vasco da Gama": 4,
            
            # México
            "Puebla": 4, "Mazatlán": 4, "Juárez": 4,
            
            # Inglaterra
            "Sheffield United": 5, "Burnley": 5, "Luton Town": 5,
            "Nottingham Forest": 4, "Everton": 3,
            
            # España
            "Granada": 5, "Almería": 5, "Cádiz": 5,
            "Celta de Vigo": 3, "Mallorca": 3,
            
            # Italia
            "Salernitana": 5, "Sassuolo": 4, "Empoli": 4,
            "Frosinone": 4, "Udinese": 3,
        }
        
        # Clásicos y rivalidades
        self.clasicos = [
            ("Boca Juniors", "River Plate", "🔥 Superclásico Argentino"),
            ("Real Madrid", "Barcelona", "🔥 El Clásico"),
            ("Atlético Nacional", "Millonarios", "🔥 Clásico Colombiano"),
            ("Flamengo", "Fluminense", "🔥 Fla-Flu"),
            ("Manchester United", "Liverpool", "🔥 Clásico Inglés"),
            ("Inter", "AC Milan", "🔥 Derby della Madonnina"),
            ("Borussia Dortmund", "Bayern Munich", "🔥 Der Klassiker"),
            ("PSG", "Olympique Marseille", "🔥 Le Classique"),
            ("Celtic", "Rangers", "🔥 Old Firm"),
            ("Ajax", "Feyenoord", "🔥 De Klassieker"),
        ]
        
        # Competiciones importantes
        self.competiciones_top = [
            "champions league", "libertadores", "mundial",
            "final", "semifinal", "cuartos", "clasificación",
            "copa del rey", "fa cup", "copa argentina",
        ]
    
    def analizar_partido(self, partido):
        """Analiza contexto y asigna score"""
        score = 0
        razones = []
        
        local = partido.get('local', '')
        visitante = partido.get('visitante', '')
        competicion = partido.get('competicion', '')
        
        # 1. Equipos en urgencia
        for equipo, puntos in self.equipos_urgentes.items():
            if equipo.lower() in local.lower():
                score += puntos
                razones.append(f"🔴 {local} en situación urgente (+{puntos})")
            if equipo.lower() in visitante.lower():
                score += puntos
                razones.append(f"🔴 {visitante} en situación urgente (+{puntos})")
        
        # 2. Clásicos
        for eq1, eq2, descripcion in self.clasicos:
            if (eq1.lower() in local.lower() and eq2.lower() in visitante.lower()) or \
               (eq2.lower() in local.lower() and eq1.lower() in visitante.lower()):
                score += 4
                razones.append(descripcion)
        
        # 3. Competición importante
        for comp in self.competiciones_top:
            if comp.lower() in competicion.lower():
                score += 3
                razones.append(f"🏟️ {competicion[:40]}")
                break
        
        # 4. Cuota óptima
        cuota = partido.get('cuota', 0)
        if CUOTA_MIN <= cuota <= CUOTA_MAX:
            score += 3
            razones.append(f"✅ Cuota {cuota} en rango óptimo")
        
        # 5. Goles esperados altos
        goles = partido.get('goles_esperados', 0)
        if goles >= 2.5:
            score += 2
            razones.append(f"📊 {goles} goles esperados")
        
        partido['score_fundamental'] = min(score, 10)
        partido['razones'] = razones
        
        return partido


