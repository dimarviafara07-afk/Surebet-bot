# ============================================
# EXTRACTOR WEB HÍBRIDO (MÚLTIPLES FUENTES)
# ============================================

class ExtractorWebUniversal:
    """Busca partidos de HOY en múltiples fuentes web"""
    
    def __init__(self):
        self.sesion = requests.Session()
        self.sesion.headers.update({
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
            'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8',
            'Accept-Language': 'es-ES,es;q=0.9,en;q=0.8',
            'Accept-Encoding': 'gzip, deflate, br',
            'Connection': 'keep-alive',
            'Upgrade-Insecure-Requests': '1',
        })
        self.hoy = datetime.now()
        self.fecha_hoy_str = self.hoy.strftime('%Y-%m-%d')
        self.partidos_encontrados = []
        
    # ============================================
    # FUENTE 1: SOCCERWAY (MUY CONFIABLE)
    # ============================================
    def extraer_soccerway(self):
        """Soccerway - Partidos de hoy"""
        print("\n🌐 [FUENTE 1] Soccerway...")
        partidos = []
        
        try:
            url = "https://int.soccerway.com/matches/today/"
            respuesta = self.sesion.get(url, timeout=15)
            
            if respuesta.status_code == 200:
                soup = BeautifulSoup(respuesta.text, 'html.parser')
                
                # Buscar todas las tablas de partidos
                tablas = soup.find_all('table', class_=re.compile(r'matches|competition'))
                
                for tabla in tablas:
                    filas = tabla.find_all('tr')
                    
                    for fila in filas:
                        try:
                            celdas = fila.find_all('td')
                            if len(celdas) >= 4:
                                # Extraer equipos
                                equipo_a = fila.find('td', class_='team-a')
                                equipo_b = fila.find('td', class_='team-b')
                                
                                if equipo_a and equipo_b:
                                    local = equipo_a.text.strip()
                                    visitante = equipo_b.text.strip()
                                    
                                    # Extraer hora
                                    hora_elem = fila.find('td', class_='score-time')
                                    hora = hora_elem.text.strip() if hora_elem else "?"
                                    
                                    # Extraer liga/competición
                                    liga_elem = tabla.find_previous('h3')
                                    liga = liga_elem.text.strip() if liga_elem else "Competición"
                                    
                                    if len(local) > 2 and len(visitante) > 2:
                                        partido = {
                                            'local': local,
                                            'visitante': visitante,
                                            'competicion': liga,
                                            'hora': hora,
                                            'fecha': self.fecha_hoy_str,
                                            'fuente': 'Soccerway'
                                        }
                                        partidos.append(partido)
                        except:
                            continue
                            
            print(f"   ✅ Soccerway: {len(partidos)} partidos encontrados")
            
        except Exception as e:
            print(f"   ⚠️ Error Soccerway: {str(e)[:50]}")
            
        return partidos
    
    # ============================================
    # FUENTE 2: FLASHSCORE (MUY COMPLETO)
